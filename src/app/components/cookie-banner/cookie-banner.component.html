<div class="cookie-banner" [class.hidden]="!isVisible()">
    <div class="cookie-content">
        <p class="cookie-text">
        <p class="cookie-text">{{ ts.t().cookieBanner.text }}</p>
        <div class="cookie-actions">
            <button class="cookie-btn accept" (click)="acceptCookies()">{{ ts.t().cookieBanner.acceptBtn }}</button>
        </div>
    </div>
</div>
